<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Kapruka — Your Shopping Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- ── ONBOARDING SCREEN ── -->
  <div id="onboarding-screen">
    <div class="onboarding-inner">
      <div class="brand-lockup">
        <div class="brand-dot"></div>
        <span class="brand-name">kapruka</span>
      </div>
      <div id="onboarding-messages" role="log" aria-live="polite"></div>
      <div class="onboarding-input-row">
        <input
          type="text"
          id="onboarding-input"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="Type here…"
          aria-label="Your answer"
        />
        <button id="onboarding-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ── MAIN CHAT SCREEN ── -->
  <div id="chat-screen" class="hidden">

    <!-- Top bar -->
    <header id="chat-header">
      <div class="header-brand">
        <div class="brand-dot small"></div>
        <span class="brand-name small">kapruka</span>
      </div>
      <div class="header-actions">
        <button id="voice-toggle" aria-label="Toggle voice" title="Toggle voice">
          <svg id="voice-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <svg id="voice-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          </svg>
          <span id="voice-pulse"></span>
        </button>
        <button id="cart-icon-btn" aria-label="Open cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span id="cart-count" class="hidden">0</span>
        </button>
      </div>
    </header>

    <!-- Message feed -->
    <main id="messages-container" role="log" aria-live="polite" aria-label="Chat messages">
      <div id="scroll-anchor"></div>
    </main>

    <!-- Input row -->
    <div id="input-area">
      <div class="input-inner">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="What are you looking for today?"
          aria-label="Message input"
          autocomplete="off"
        ></textarea>
        <button id="mic-btn" aria-label="Voice input" title="Speak">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="2" width="6" height="11" rx="3"></rect>
            <path d="M5 10a7 7 0 0 0 14 0"></path>
            <line x1="12" y1="19" x2="12" y2="22"></line>
            <line x1="8" y1="22" x2="16" y2="22"></line>
          </svg>
        </button>
        <button id="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- ── CART OVERLAY + PANEL ── -->
  <div id="cart-overlay"></div>

  <aside id="cart-panel" aria-label="Shopping cart">
    <div id="cart-panel-header">
      <h2>Your Cart</h2>
      <button id="cart-close" aria-label="Close cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div id="cart-items-list"></div>
    <div id="cart-empty-state">
      <p>Your cart is empty</p>
      <p class="subtle">Add products during the conversation</p>
    </div>
    <div id="cart-footer">
      <div id="cart-total-row">
        <span>Total</span>
        <span id="cart-total-amount">Rs. 0</span>
      </div>
      <button id="checkout-btn" disabled>Proceed to Checkout</button>
    </div>
  </aside>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="app.js" type="module"></script>

</body>
</html>
